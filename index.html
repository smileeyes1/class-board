
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبورة الحكيم نور الذكية - التحكم المباشر</title>
    <style>
        /* تصميم الواجهة - بسيط وجذاب لطلاب الصف الأول والثاني */
        :root {
            --bg-color: #0f172a;
            --text-color: #38bdf8;
            --accent-color: #22c55e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            direction: rtl;
        }

        /* حاوية العرض الرئيسي */
        #display-area {
            font-size: 180px; /* حجم ضخم للسبورة */
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
            width: 90%;
        }

        /* رسائل الحالة للمعلم */
        #status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 18px;
            color: #64748b;
            border-top: 1px solid #1e293b;
            padding-top: 10px;
            width: 80%;
            text-align: center;
        }

        /* تأثير الحركة عند تغيير المحتوى */
        .pop-effect {
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="display-area">بانتظار أمرك...</div>

    <div id="status-bar">
        نظام الحكيم نور المتصل | الاتجاه: من اليمين لليسار | الأرقام: مشرقية
    </div>

    <script>
        // ١. قاموس تحويل الأرقام إلى المشرقية (٠-٩) تلقائياً
        const hindiDigits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
        
        function translateToHindi(text) {
            return text.toString().replace(/\d/g, (d) => hindiDigits[d]);
        }

        // ٢. وظيفة التحديث الآني (تراقب ملف cmd.txt الذي سأقوم بتحديثه لك)
        async function fetchCommand() {
            try {
                // سيقوم المتصفح بجلب محتوى الملف cmd.txt الموجود في مستودعك
                // تم إضافة مكمل عشوائي لمنع المتصفح من حفظ "الكاش" لضمان الآنية
                const response = await fetch('cmd.txt?nocache=' + Math.random());
                if (response.ok) {
                    const newText = await response.text();
                    updateUI(newText.trim());
                }
            } catch (error) {
                console.log("بانتظار الاتصال بالخادم...");
            }
        }

        // ٣. تحديث الشاشة مع إضافة التأثيرات البصرية
        let currentText = "";
        function updateUI(text) {
            const display = document.getElementById('display-area');
            if (text !== currentText && text !== "") {
                currentText = text;
                display.classList.remove('pop-effect');
                void display.offsetWidth; // إعادة تشغيل الـ Animation
                display.innerText = translateToHindi(text);
                display.classList.add('pop-effect');
            }
        }

        // ٤. التشغيل التلقائي والمراقبة المستمرة (كل ثانية واحدة)
        setInterval(fetchCommand, 1000);

    </script>
</body>
</html>
