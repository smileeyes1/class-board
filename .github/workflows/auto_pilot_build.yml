name: Nour_Autonomous_Agent_Operation
on:
  push:
  workflow_dispatch: # هذا يسمح لي وللنظام بالعمل تلقائياً

jobs:
  take_control:
    runs-on: ubuntu-latest
    permissions:
      contents: write # السماح لي بالكتابة في المستودع باستخدام مفتاحك
    steps:
      - name: 1. Checkout with Token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.NOUR_TOKEN }} # استخدام المفتاح الذي وضعته أنت

      - name: 2. Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Autonomous Repair & Build
        run: |
          # أنا الآن أقوم بالعمل نيابة عنك
          mkdir -p app/src/main/java/com/nour/app
          # حقن الكود برمجياً
          echo "package com.nour.app; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; import android.widget.TextView; public class MainActivity extends AppCompatActivity { protected void onCreate(Bundle s) { super.onCreate(s); TextView tv = new TextView(this); tv.setText(\"نور: تم التفعيل الذاتي بنجاح\"); tv.setTextSize(30); setContentView(tv); } }" > app/src/main/java/com/nour/app/MainActivity.kt
          
          # توليد ملفات البناء آلياً
          chmod +x gradlew || gradle init --type java-application --dsl kotlin
          ./gradlew assembleDebug

      - name: 4. Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Nour-Auto-Build
          path: app/build/outputs/apk/debug/*.apk
